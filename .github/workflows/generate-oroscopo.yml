name: Genera Oroscopo RSS

on:
  # Trigger: esegui ogni giorno alle 6:00 ora italiana (5:00 UTC)
  schedule:
    - cron: '0 5 * * *'
  
  # Trigger: esecuzione manuale
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Installa dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r feederss_files/script/requirements.txt
    
    - name: Genera feed RSS
      run: |
        cd feederss_files/script && python oroscopo_rss.py
    
    - name: Commit e push feed RSS
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Aggiungi tutti i feed RSS generati
        git add feederss_files/script/rss_feeds/
        git diff --staged --quiet || git commit -m "Aggiorna feed RSS oroscopo del giorno"
        
        # Crea o switcha al branch rss-feed
        git checkout -b rss-feed || git checkout rss-feed
        git pull --rebase origin rss-feed || true
        git push origin rss-feed
