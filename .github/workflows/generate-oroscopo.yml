name: Genera Oroscopo RSS

on:
  # Trigger: esegui ogni giorno alle 8:00 ora italiana (7:00 UTC)
  schedule:
    - cron: '0 7 * * *'
  
  # Trigger: esecuzione manuale
  workflow_dispatch:
  
  # Trigger: push sul branch main
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Installa dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r feederss_files/script/requirements.txt
    
    - name: Genera feed RSS
      run: |
        cd feederss_files/script && python oroscopo_rss.py
    
    - name: Commit e push feed RSS
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add feederss_files/script/rss_feeds/oroscopo_oggi_completo.xml
        git diff --staged --quiet || git commit -m "Aggiorna feed RSS oroscopo del giorno [skip ci]"
        git push
